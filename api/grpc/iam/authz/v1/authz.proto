syntax = "proto3";

package iam.authz.v1;

option go_package = "github.com/FangcunMount/iam-contracts/api/grpc/iam/authz/v1;authzv1";

// AuthorizationService 策略判定（PDP）gRPC 面。
service AuthorizationService {
  // Check 对 (subject, domain, object, action) 执行 Casbin Enforce。
  rpc Check(CheckRequest) returns (CheckResponse);
}

message CheckRequest {
  // Casbin sub，如 user:<uuid>、group:<id>
  string subject = 1;
  // 租户域，与 Casbin dom 一致
  string domain = 2;
  string object = 3;
  string action = 4;
}

message CheckResponse {
  bool allowed = 1;
}
