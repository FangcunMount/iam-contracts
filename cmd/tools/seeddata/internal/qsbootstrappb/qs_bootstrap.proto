syntax = "proto3";

package internalapi;

option go_package = "github.com/FangcunMount/iam-contracts/cmd/tools/seeddata/internal/qsbootstrappb;qsbootstrappb";

service InternalService {
  rpc BootstrapOperator(BootstrapOperatorRequest) returns (BootstrapOperatorResponse);
}

message BootstrapOperatorRequest {
  int64 org_id = 1;
  int64 user_id = 2;
  string name = 3;
  string email = 4;
  string phone = 5;
  bool is_active = 6;
}

message BootstrapOperatorResponse {
  uint64 operator_id = 1;
  bool created = 2;
  string message = 3;
  repeated string roles = 4;
}
