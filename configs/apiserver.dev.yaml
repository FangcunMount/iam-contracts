# ============================================================================
# iam-apiserver 开发环境配置
# ============================================================================
# 用途：IAM 身份认证与授权服务本地开发环境配置
# 维护：开发团队
# 更新时间：2025-12-10
# ============================================================================

# ============================================================================
# 1. 应用基础配置
# ============================================================================
app:
  name: "iam"
  version: "1.0.0"
  mode: "development"  # development, production

# ============================================================================
# 2. 服务端口配置
# ============================================================================

# ----------------------------------------------------------------------------
# 2.1 RESTful HTTP/HTTPS 服务配置
# ----------------------------------------------------------------------------
server:
  name: "iam"
  run-mode: "debug"   # Gin 开发模式: debug, release, test
  read-timeout: 60    # 秒
  write-timeout: 60   # 秒

# HTTP REST API 配置（不安全，内网使用）
# 用途：本地开发调试，健康检查
insecure:
  bind-address: "0.0.0.0"
  bind-port: 18081

# HTTPS REST API 配置（安全，外网访问）
# 用途：本地开发 HTTPS 测试
secure:
  bind-address: "0.0.0.0"
  bind-port: 18441
  tls:
    cert-file: /data/infra/ssl/web/iam-apiserver.crt
    private-key-file: /data/infra/ssl/web/iam-apiserver.key

# CORS 跨域配置（开发环境允许所有来源）
cors:
  allowed-origins:
    - "*"
  allowed-methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allowed-headers:
    - "Content-Type"
    - "Authorization"
    - "X-Requested-With"

# ----------------------------------------------------------------------------
# 2.2 gRPC 服务配置（开发环境）
# ----------------------------------------------------------------------------
grpc:
  bind-address: "0.0.0.0"
  bind-port: 19091
  healthz-port: 19092
  
  # mTLS 双向认证配置（由 infra 项目统一管理）
  mtls:
    enabled: true   # 开发环境开启 mTLS
    cert-file: "/data/infra/ssl/grpc/server/iam-apiserver.crt"
    key-file: "/data/infra/ssl/grpc/server/iam-apiserver.key"
    ca-file: "/data/infra/ssl/grpc/ca/ca-chain.crt"
    # ca-dir: "/data/infra/ssl/grpc/ca/"  # 可选：CA 证书目录，支持多级 CA 信任链
    require-client-cert: true
    
    # 允许的客户端证书 OU 列表
    allowed-ous:
      - QS
      - Admin
      - Ops
    
    # 证书自动重载
    enable-auto-reload: true
    reload-interval: 5m
  
  # 应用层凭证认证配置
  auth:
    enabled: false  # 开发环境默认禁用
    enable-bearer: true   # JWT Bearer Token
    enable-hmac: true     # HMAC 签名
    enable-api-key: true  # API Key
    hmac-timestamp-validity: 5m
    require-identity-match: true
  
  # 服务级 ACL 配置
  acl:
    enabled: false  # 开发环境默认禁用
    config-file: "./configs/grpc_acl.yaml"
  
  # 审计日志配置
  audit:
    enabled: true  # 开发环境开启审计日志，便于调试

# ============================================================================
# 3. 数据存储配置
# ============================================================================

# ----------------------------------------------------------------------------
# 3.1 MySQL 数据库配置
# ----------------------------------------------------------------------------
mysql:
  host: "127.0.0.1:3306"
  username: "infra_dev"        # 对应 build/docker/infra/dev.env -> MYSQL_USER
  password: "dev_pass_123"     # 对应 build/docker/infra/dev.env -> MYSQL_PASSWORD
  database: "iam_contracts"
  max-idle-conns: 10
  max-open-conns: 100
  conn-max-lifetime: 3600  # 秒
  log-level: 4 # GORM log level, 1: silent, 2:error, 3:warn, 4:info (开发环境使用 info)

# ----------------------------------------------------------------------------
# 3.2 数据库迁移配置
# ----------------------------------------------------------------------------
migration:
  enabled: true  # 开发环境启用自动迁移
  autoseed: true  # 开发环境自动加载种子数据
  database: "iam_contracts"

# ----------------------------------------------------------------------------
# 3.3 Redis 配置
# ----------------------------------------------------------------------------
redis:
  # Redis - 用于缓存、令牌等
  cache:
    host: "127.0.0.1"
    port: 6379
    username: "app"  # 开发环境默认使用 default 用户
    password: "dev_app_123"  # 对应 build/docker/infra/dev.env -> REDIS_CACHE_PASSWORD/REDIS_AUTH_APP_PASSWORD
    database: 0  # Cache 使用 DB 0
    max-idle: 200
    max-active: 500
    min-idle-conns: 20
    timeout: 10
    pool-timeout: 10
    dial-timeout: 5
    read-timeout: 5
    write-timeout: 5
    enable-cluster: false
    use-ssl: false
    enable-logging: true  # 开启 Redis 命令日志（用于调试，生产环境建议关闭）

# ============================================================================
# 4. 安全与认证配置
# ============================================================================

# ----------------------------------------------------------------------------
# 4.1 JWKS 密钥管理
# ----------------------------------------------------------------------------
jwks:
  keys_dir: "./configs/keys"  # 私钥存放目录（相对或绝对路径）
  auto_init: true           # 启动时若无 active key 则自动生成（仅建议在开发环境启用）

# ----------------------------------------------------------------------------
# 4.2 TLS 证书（通用）
# ----------------------------------------------------------------------------
tls:
  cert: /data/infra/ssl/web/iam-apiserver.crt
  key: /data/infra/ssl/web/iam-apiserver.key
  strict: false  # 开发环境不严格验证

# ----------------------------------------------------------------------------
# 4.3 IDP 身份提供商
# ----------------------------------------------------------------------------
idp:
  encryption-key: ""  # 留空使用默认密钥（开发环境）或通过环境变量 IAM_APISERVER_IDP_ENCRYPTION_KEY 设置

# ----------------------------------------------------------------------------
# 4.4 短信登录 OTP（发码）
# ----------------------------------------------------------------------------
# provider: log（仅打日志）| mq（经 NSQ 发布 iam.notify.sms，由下游真正发短信）
# mq 需同时开启下方 nsq.enabled
sms:
  provider: log
  login_otp_ttl: 5m
  login_otp_send_cooldown: 60s
  login_otp_code_length: 6
  mq:
    topic: iam.notify.sms

# ----------------------------------------------------------------------------
# 4.5 Suggest 联想模块
# ----------------------------------------------------------------------------
suggest:
  enable: true
  data_dir: "./data/suggest"
  full_sync_cron: "@every 1h"
  delta_sync_cron: "@every 5m"
  max_results: 20
  key_pad_len: 25
  snapshot: true

# ============================================================================
# 5. 系统运行配置
# ============================================================================

# ----------------------------------------------------------------------------
# 5.1 日志配置（开发环境 - 使用 component-base v0.2.9 duplicate 模式）
# ----------------------------------------------------------------------------
log:
  # 基础配置
  disable-caller: false        # 开发环境显示调用者信息
  disable-stacktrace: false    # 开发环境显示堆栈
  level: debug                 # 开发环境使用 debug 级别
  format: console              # 控制台格式（console/json）
  enable-color: true           # 🎨 开发环境启用彩色输出，便于调试
  development: true            # 开发模式
  
  # 📊 日志轮转配置（按大小）
  max-size: 100                # 单个日志文件最大大小（MB）
  max-age: 7                   # 保留 7 天
  max-backups: 10              # 保留 10 个备份文件
  compress: true               # 压缩旧文件
  
  # ⏰ 按时间轮转（可选，与大小轮转二选一）
  enable-time-rotation: false  # 开发环境暂不启用
  time-rotation-format: "2006-01-02"  # 按天轮转格式
  
  # 🎯 分级输出（v0.2.9 duplicate 模式）
  enable-level-output: true       # 启用分级输出
  level-output-mode: "duplicate"  # 输出模式：duplicate=重复输出（推荐）
  level-output-paths:
    all:
      - stdout                    # 所有日志输出到控制台（彩色，开发环境）
      - logs/iam-apiserver.log    # 所有日志记录到文件（完整日志）
    warn:
      - logs/iam-warn.log         # WARN 以上额外记录，辅助排查性能/配置问题
    error:
      - logs/iam-error.log        # ERROR 额外落盘，便于快速定位故障

# ----------------------------------------------------------------------------
# 5.2 NSQ 消息队列配置（可选，用于事件驱动）
# ----------------------------------------------------------------------------
nsq:
  enabled: false                              # 开发环境默认禁用
  lookupd-addrs:                              # NSQLookupd 地址
    - "127.0.0.1:4161"
  nsqd-addr: "127.0.0.1:4150"                # NSQd 地址
  max-attempts: 5                             # 消息最大重试次数
  max-in-flight: 200                          # 最大并发处理数
  msg-timeout: 60                             # 消息超时时间（秒）
  requeue-delay: 5                            # 重新入队延迟（秒）
