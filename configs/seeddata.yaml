    type: "collection"
    actions: ["read", "list", "statistics", "admin_submit"]
    description: "答卷查询、统计与管理员提交"

  - alias: "res_qs_assessments"
    key: "qs:assessments"
    display_name: "测评执行"
    app_name: "qs"
    domain: "evaluation"
    type: "collection"
    actions: ["read", "list", "retry", "batch_evaluate", "statistics"]
