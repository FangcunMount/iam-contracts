# ============================================================================
# IAM Contracts 种子数据配置文件
# ============================================================================
# 描述: 初始化系统所需的基础数据和测试数据
# 版本: 3.1.0
# 更新时间: 2026-03-31
# 说明: 与数据库迁移文件同步 (internal/pkg/migration/migrations/)
# ============================================================================

# ==================== 0. 加密配置 ====================
# IDP 模块加密密钥（用于加密微信 AppSecret 等敏感信息）
# 必须是 32 字节，可以是 Base64 编码的字符串
# ⚠️ 必须与生产环境 IAM_APISERVER_IDP_ENCRYPTION_KEY 保持一致
# ⚠️ 如果留空，将使用默认密钥（仅用于开发环境）
encryption_key: ""

# ==================== 1. 租户配置 ====================
tenants:
  # 业务默认租户：与 pkg/tenant.DefaultID、tenants.id、authz/Casbin domain 对齐
  - code: "fangcun"
    name: "方寸"
    contact_name: "admin"
    contact_phone: "15711236163"
    contact_email: "yshujie@163.com"
    status: "active"
    max_users: 1000
    max_roles: 100

  # 平台保留租户：仅承载平台级根角色，不作为业务租户使用
  - code: "platform"
    name: "平台控制面"
    contact_name: "system"
    contact_phone: ""
    contact_email: "system@fangcunmount.com"
    status: "active"
    max_users: 100
    max_roles: 100

# ==================== 2. 用户配置 (User Center) ====================
users:
  # 系统用户（10001）：内置身份，持有 platform/super_admin + fangcun/tenant_admin + fangcun/qs:admin。phone 可留空；须保留 id 以便 seed 幂等；登录依赖运营账号 external_id/邮箱
  - alias: "system"
    id: 10001
    name: "系统用户"
    phone: ""
    email: "system@fangcunmount.com"
    id_card: ""
    status: 1
    org_id: 1
    roles: ["qs:admin"]
    is_active: true

  # 方寸租户（fangcun）管理员：租户级权限（tenant_admin），非全局 super_admin
  - alias: "admin"
    id: 110001
    name: "租户管理员"
    phone: ""
    email: "admin@fangcunmount.com"
    id_card: ""
    status: 1
    org_id: 1
    roles: ["qs:admin"]

  # 内容管理员（users[].roles 仅用于 QS staff 投影，不作为 IAM 角色真值）
  - alias: "content_manager"
    id: 110002
    name: "内容管理员"
    phone: ""
    email: "content_manager@fangcunmount.com"
    id_card: ""
    status: 1
    org_id: 1
    roles: ["qs:content_manager"]

# ==================== 5. 认证账号配置 (Authentication) ====================
accounts:
  # operation 账号的真实登录名写在 external_id；内部固定落成 type=opera、app_id=opera
  # system 账号：平台保留用户，用于平台控制面和 fangcun 管理面 bootstrap
  - alias: "system_account"
    user_alias: "system"
    provider: "operation"
    external_id: "system@fangcunmount.com"
    password: "Admin@123"  # 注意: 生产环境应使用强密码
    status: 1

  # fangcun 租户管理员：日常 IAM + QS 管理账号
  - alias: "admin_account"
    user_alias: "admin"
    provider: "operation"
    external_id: "admin@fangcunmount.com"
    password: "Admin@123"  # 注意: 生产环境应使用强密码
    status: 1

  # 内容管理员：仅用于问卷/量表内容管理
  - alias: "content_manager_account"
    user_alias: "content_manager"
    provider: "operation"
    external_id: "content_manager@fangcunmount.com"
    password: "Admin@123"  # 注意: 生产环境应使用强密码
    status: 1
    

# ==================== 5.5 角色配置 (Authorization) ====================
roles:
  # ========== IAM 系统角色（建议补充，确保 seeddata 可统一管理） ==========
  - alias: "super_admin"
    name: "super_admin"
    display_name: "超级管理员"
    tenant_id: "platform"
    description: "平台控制面的根角色"

  - alias: "tenant_admin"
    name: "tenant_admin"
    display_name: "租户管理员"
    tenant_id: "fangcun"
    description: "管理本租户内的所有资源"

  - alias: "user"
    name: "user"
    display_name: "普通用户"
    tenant_id: "fangcun"
    description: "普通用户权限"

  # ========== QS 服务角色 ==========
  - alias: "qs_admin"
    name: "qs:admin"
    display_name: "QS管理员"
    tenant_id: "fangcun"
    description: "QS服务所有资源的管理权限"
  
  - alias: "qs_content_manager"
    name: "qs:content_manager"
    display_name: "内容管理员"
    tenant_id: "fangcun"
    description: "问卷和量表的管理权限"
  
  - alias: "qs_evaluator"
    name: "qs:evaluator"
    display_name: "评估员"
    tenant_id: "fangcun"
    description: "测评相关只读权限"
  
  - alias: "qs_staff"
    name: "qs:staff"
    display_name: "普通员工"
    tenant_id: "fangcun"
    description: "基本查看权限"
  
  - alias: "qs_evaluation_plan_manager"
    name: "qs:evaluation_plan_manager"
    display_name: "测评计划管理员"
    tenant_id: "fangcun"
    description: "测评计划的管理权限"
  
  - alias: "qs_screening_plan_manager"
    name: "qs:screening_plan_manager"
    display_name: "筛查计划管理员"
    tenant_id: "fangcun"
    description: "筛查计划的管理权限"
  
# ==================== 6. 授权资源配置 (Authorization) ====================
resources:
  # ========== IAM 服务资源 ==========
  - alias: "res_iam_profile"
    key: "iam:profile"
    display_name: "个人资料"
    app_name: "iam"
    domain: "uc"
    type: "instance"
    actions: ["read", "update"]
    description: "当前用户自服务资料读取与更新"

  - alias: "res_iam_users"
    key: "iam:users"
    display_name: "用户管理"
    app_name: "iam"
    domain: "identity"
    type: "collection"
    actions: ["read", "search", "create", "update", "deactivate", "block", "link_external_identity"]
    description: "用户资料、状态和外部身份关联管理"

  - alias: "res_iam_children"
    key: "iam:children"
    display_name: "儿童档案"
    app_name: "iam"
    domain: "identity"
    type: "collection"
    actions: ["read", "list", "search", "create", "update"]
    description: "儿童档案查询、注册与更新"

  - alias: "res_iam_guardianships"
    key: "iam:guardianships"
    display_name: "监护关系"
    app_name: "iam"
    domain: "identity"
    type: "collection"
    actions: ["read", "list", "grant", "update_relation", "revoke", "bulk_revoke", "import"]
    description: "监护关系授予、更新、撤销与导入"

  - alias: "res_iam_roles"
    key: "iam:roles"
    display_name: "角色管理"
    app_name: "iam"
    domain: "authz"
    type: "collection"
    actions: ["create", "read", "update", "delete", "list"]
    description: "角色目录管理"

  - alias: "res_iam_assignments"
    key: "iam:assignments"
    display_name: "角色分配"
    app_name: "iam"
    domain: "authz"
    type: "collection"
    actions: ["grant", "revoke", "delete", "read"]
    description: "主体与角色分配管理"

  - alias: "res_iam_policies"
    key: "iam:policies"
    display_name: "策略管理"
    app_name: "iam"
    domain: "authz"
    type: "collection"
    actions: ["read", "write", "delete"]
    description: "Casbin 策略规则管理"

  - alias: "res_iam_resources"
    key: "iam:resources"
    display_name: "资源目录"
    app_name: "iam"
    domain: "authz"
    type: "collection"
    actions: ["create", "read", "update", "delete", "list", "validate_action"]
    description: "资源目录定义和动作校验"

  - alias: "res_iam_check"
    key: "iam:check"
    display_name: "权限判定"
    app_name: "iam"
    domain: "authz"
    type: "action"
    actions: ["check"]
    description: "单次 PDP 权限判定"

  - alias: "res_iam_accounts"
    key: "iam:accounts"
    display_name: "账号管理"
    app_name: "iam"
    domain: "authn"
    type: "collection"
    actions: ["read", "update", "enable", "disable", "set_unionid"]
    description: "认证账号读取、资料更新与启停用"

  - alias: "res_iam_jwks"
    key: "iam:jwks"
    display_name: "JWKS 密钥管理"
    app_name: "iam"
    domain: "authn"
    type: "collection"
    actions: ["create", "read", "list", "retire", "force_retire", "enter_grace", "cleanup", "list_publishable"]
    description: "JWT 签名密钥与发布管理"

  - alias: "res_iam_wechat_apps"
    key: "iam:wechat_apps"
    display_name: "微信应用管理"
    app_name: "iam"
    domain: "idp"
    type: "collection"
    actions: ["create", "read", "rotate_auth_secret", "rotate_msg_secret", "refresh_access_token", "get_access_token"]
    description: "微信应用与令牌管理"

  # ========== QS 服务资源 ==========
  - alias: "res_qs_questionnaires"
    key: "qs:questionnaires"
    display_name: "问卷管理"
    app_name: "qs"
    domain: "questionnaire"
    type: "collection"
    actions: ["create", "read", "list", "update", "delete", "publish", "unpublish", "archive", "statistics"]
    description: "问卷创建、维护、发布与统计"

  - alias: "res_qs_scales"
    key: "qs:scales"
    display_name: "量表管理"
    app_name: "qs"
    domain: "scale"
    type: "collection"
    actions: ["create", "read", "list", "update", "delete", "publish", "unpublish", "archive"]
    description: "量表创建、维护与发布"

  - alias: "res_qs_answersheets"
    key: "qs:answersheets"
    display_name: "答卷管理"
    app_name: "qs"
