  - alias: "res_qs_statistics_jobs"
    key: "qs:statistics_jobs"
    display_name: "统计作业"
    app_name: "qs"
    domain: "statistics"
    type: "collection"
    actions: ["sync", "validate"]
    description: "统计同步与一致性校验"

  - alias: "res_qs_codes"
    key: "qs:codes"
    display_name: "邀请码申请"
    app_name: "qs"
    domain: "code"
    type: "collection"
    actions: ["apply"]
    description: "邀请码申请"

# ==================== 7. 角色分配配置 (Authorization) ====================
# 注意：
# - subject_id 使用 @alias 语法引用 users 中的别名，运行时替换为实际用户ID
# - role_alias 使用 @alias 语法引用 roles 中的别名；也可以直接用 role_id
assignments:
  # 系统用户（10001）：platform 超级管理员 + fangcun/IAM 租户管理员 + fangcun/QS 管理员
  - subject_type: "user"
    subject_id: "@system"
    role_alias: "@super_admin"
    tenant_id: "platform"
    granted_by: "system"
  - subject_type: "user"
    subject_id: "@system"
    role_alias: "@tenant_admin"
    tenant_id: "fangcun"
    granted_by: "system"
  - subject_type: "user"
    subject_id: "@system"
    role_alias: "@qs_admin"
    tenant_id: "fangcun"
    granted_by: "system"

  # 租户管理员（110001）：本租户 tenant_admin + QS 管理员
  - subject_type: "user"
    subject_id: "@admin"
    role_alias: "@tenant_admin"
    tenant_id: "fangcun"
    granted_by: "system"
  - subject_type: "user"
    subject_id: "@admin"
    role_alias: "@qs_admin"
    tenant_id: "fangcun"
    granted_by: "system"

  # 内容管理员：仅作为 QS 内容管理示例账号
  - subject_type: "user"
    subject_id: "@content_manager"
    role_alias: "@qs_content_manager"
    tenant_id: "fangcun"
    granted_by: "system"
  
# ==================== 8. Casbin 策略配置 (Authorization) ====================
policies:
  # ========== IAM 全局角色策略 ==========
  # 平台超级管理员：仅在 platform 域内拥有全量平台权限
  - type: "p"
    subject: "role:super_admin"
    values: ["platform", "*", ".*"]

  # 租户管理员：显式管理 IAM 管理面资源，不持有平台密钥能力
  - type: "p"
    subject: "role:tenant_admin"
    values: ["fangcun", "iam:users", "read|search|create|update|deactivate|block|link_external_identity"]
  - type: "p"
    subject: "role:tenant_admin"
    values: ["fangcun", "iam:children", "read|list|search|create|update"]
  - type: "p"
    subject: "role:tenant_admin"
    values: ["fangcun", "iam:guardianships", "read|list|grant|update_relation|revoke|bulk_revoke|import"]
  - type: "p"
    subject: "role:tenant_admin"
    values: ["fangcun", "iam:roles", "create|read|update|delete|list"]
  - type: "p"
    subject: "role:tenant_admin"
    values: ["fangcun", "iam:assignments", "grant|revoke|delete|read"]
  - type: "p"
    subject: "role:tenant_admin"
    values: ["fangcun", "iam:policies", "read|write|delete"]
  - type: "p"
    subject: "role:tenant_admin"
    values: ["fangcun", "iam:resources", "create|read|update|delete|list|validate_action"]
  - type: "p"
    subject: "role:tenant_admin"
    values: ["fangcun", "iam:check", "check"]
  - type: "p"
    subject: "role:tenant_admin"
    values: ["fangcun", "iam:accounts", "read|update|enable|disable"]

  # 普通用户：只能读取和更新自己的信息
  - type: "p"
    subject: "role:user"
    values: ["fangcun", "iam:profile", "read"]
  - type: "p"
    subject: "role:user"
    values: ["fangcun", "iam:profile", "update"]

  # ========== QS 服务角色策略 ==========
  # QS 管理员：所有 QS 资源的所有操作
  - type: "p"
    subject: "role:qs:admin"
    values: ["fangcun", "qs:*", ".*"]

  # 内容管理员：问卷和量表的完整管理
  - type: "p"
    subject: "role:qs:content_manager"
    values: ["fangcun", "qs:questionnaires", "create|read|list|update|delete|publish|unpublish|archive|statistics"]
  - type: "p"
    subject: "role:qs:content_manager"
    values: ["fangcun", "qs:scales", "create|read|list|update|delete|publish|unpublish|archive"]

  # 评估员：测评执行、报告与受试者分析
  - type: "p"
    subject: "role:qs:evaluator"
    values: ["fangcun", "qs:answersheets", "read|list|statistics"]
  - type: "p"
    subject: "role:qs:evaluator"
    values: ["fangcun", "qs:assessments", "read|list|retry|batch_evaluate|statistics"]
  - type: "p"
    subject: "role:qs:evaluator"
    values: ["fangcun", "qs:reports", "read|list"]
  - type: "p"
    subject: "role:qs:evaluator"
    values: ["fangcun", "qs:testees", "read|list|analyze|statistics"]

  # 普通员工：只能查看受试者
  - type: "p"
    subject: "role:qs:staff"
    values: ["fangcun", "qs:testees", "read|list"]

  # 测评计划管理员：测评计划与任务管理
  - type: "p"
    subject: "role:qs:evaluation_plan_manager"
    values: ["fangcun", "qs:evaluation_plans", "create|read|list|update|pause|resume|cancel|enroll|terminate|statistics"]
  - type: "p"
    subject: "role:qs:evaluation_plan_manager"
    values: ["fangcun", "qs:evaluation_plan_tasks", "schedule|read|list|open|complete|expire|cancel"]

  # 筛查计划管理员：筛查计划与任务管理
  - type: "p"
    subject: "role:qs:screening_plan_manager"
    values: ["fangcun", "qs:screening_plans", "create|read|list|update|pause|resume|cancel|enroll|terminate|statistics"]
  - type: "p"
    subject: "role:qs:screening_plan_manager"
    values: ["fangcun", "qs:screening_plan_tasks", "schedule|read|list|open|complete|expire|cancel"]

  # ========== 角色继承 ==========
  # IAM 角色继承
  - type: "g"
    subject: "role:tenant_admin"
    values: ["role:user", "fangcun"]

  # QS 角色继承：管理员拥有各能力角色，能力角色再继承只读 staff
  - type: "g"
    subject: "role:qs:admin"
    values: ["role:qs:content_manager", "fangcun"]
  - type: "g"
    subject: "role:qs:admin"
    values: ["role:qs:evaluator", "fangcun"]
  - type: "g"
    subject: "role:qs:admin"
    values: ["role:qs:evaluation_plan_manager", "fangcun"]
  - type: "g"
    subject: "role:qs:admin"
    values: ["role:qs:screening_plan_manager", "fangcun"]
  - type: "g"
    subject: "role:qs:evaluator"
    values: ["role:qs:staff", "fangcun"]
  - type: "g"
    subject: "role:qs:evaluation_plan_manager"
    values: ["role:qs:staff", "fangcun"]
  - type: "g"
    subject: "role:qs:screening_plan_manager"
    values: ["role:qs:staff", "fangcun"]

# ==================== 9. JWKS 密钥配置 (Authentication) ====================
jwks:
  key_id: "rsa-key-2025-10-31"
  algorithm: "RS256"
  key_size: 2048
  valid_years: 1

# ==================== 10. 微信应用配置 (IDP - WeChat) ====================
wechat_apps:
  # 问卷笔记本小程序
  - alias: "questionnaire_notebook"
    app_id: "wx72ade250b619a649"
    name: "问卷笔记本小程序"
    type: "MiniProgram"
    status: "Enabled"
    app_secret: ""  # 生产环境中应通过环境变量或密钥管理系统设置

# ==================== 11. Collection 服务配置 ====================
# Collection 服务用于创建受试者（testee）数据
# 在 seed_family 过程中，每创建一个儿童（child）后，会自动调用 collection 服务创建对应的受试者
collection_url: "https://collect.fangcunmount.cn/api/v1"  # Collection 服务 API 地址
# 注意：Collection 服务认证通过 IAM 服务动态获取超级管理员 token，无需预配置

# ==================== 12. QS 服务配置 ====================
# QS 服务用于创建员工、受试者等数据
# 在 seed_system 过程中，创建管理员后会自动调用 QS 服务创建对应的员工
qs_service_url: "https://qs.fangcunmount.cn/api/v1"  # QS 服务 API 地址

# ==================== 13. IAM 服务配置 ====================
# IAM 服务 URL（用于 seeddata 工具登录获取 token）
# 在创建员工前，需要先登录 IAM 获取 access_token
iam_service_url: "https://iam.fangcunmount.cn/api/v1"  # IAM 服务 API 地址
