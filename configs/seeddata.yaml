  - alias: "res_qs_reports"
    key: "qs:reports"
    display_name: "测评报告"
    app_name: "qs"
    domain: "evaluation"
    type: "collection"
    actions: ["read", "list"]
    description: "测评报告查询"

  - alias: "res_qs_testees"
    key: "qs:testees"
    display_name: "受试者管理"
    app_name: "qs"
    domain: "actor"
    type: "collection"
    actions: ["read", "list", "update", "analyze", "statistics"]
    description: "受试者资料、分析与统计"

  - alias: "res_qs_staff"
    key: "qs:staff"
    display_name: "员工管理"
    app_name: "qs"
    domain: "actor"
    type: "collection"
    actions: ["create", "read", "list", "delete"]
    description: "员工创建、查询与删除"

  - alias: "res_qs_evaluation_plans"
    key: "qs:evaluation_plans"
    display_name: "测评计划"
    app_name: "qs"
    domain: "plan"
    type: "collection"
    actions: ["create", "read", "list", "update", "pause", "resume", "cancel", "enroll", "terminate", "statistics"]
    description: "测评计划生命周期与统计"

  - alias: "res_qs_screening_plans"
    key: "qs:screening_plans"
    display_name: "筛查计划"
    app_name: "qs"
    domain: "plan"
    type: "collection"
    actions: ["create", "read", "list", "update", "pause", "resume", "cancel", "enroll", "terminate", "statistics"]
    description: "筛查计划生命周期与统计"

  - alias: "res_qs_evaluation_plan_tasks"
    key: "qs:evaluation_plan_tasks"
    display_name: "测评计划任务"
    app_name: "qs"
    domain: "plan_task"
    type: "collection"
    actions: ["schedule", "read", "list", "open", "complete", "expire", "cancel"]
    description: "测评计划任务调度与状态流转"

  - alias: "res_qs_screening_plan_tasks"
    key: "qs:screening_plan_tasks"
    display_name: "筛查计划任务"
    app_name: "qs"
    domain: "plan_task"
    type: "collection"
    actions: ["schedule", "read", "list", "open", "complete", "expire", "cancel"]
    description: "筛查计划任务调度与状态流转"

  - alias: "res_qs_system_statistics"
    key: "qs:system_statistics"
    display_name: "系统统计"
    app_name: "qs"
    domain: "statistics"
    type: "collection"
    actions: ["read"]
