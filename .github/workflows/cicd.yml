name: CI/CD Pipeline

# 必需/可选 Secrets 说明：
# 必需（部署 main 分支时强制校验）：
#   SVRA_HOST, SVRA_USERNAME, SVRA_SSH_KEY
#   MYSQL_HOST, MYSQL_USERNAME, MYSQL_PASSWORD, MYSQL_DBNAME
#   REDIS_HOST
#   IPD_ENCRYPTION_KEY
#   GRPC_CA_CHAIN, GRPC_SERVER_CRT, GRPC_SERVER_KEY
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# 可选（缺失时使用默认或跳过）：
#   SVRA_SSH_PORT, SVRA_SUDO_PASSWORD
#   MYSQL_PORT
#   REDIS_PORT, REDIS_DB, REDIS_USERNAME, REDIS_PASSWORD
#   WWW_UID, WWW_GID
#   NSQ_LOOKUPD_HOST, NSQ_LOOKUPD_PORT, NSQ_NSQD_HOST, NSQ_NSQD_PORT (事件驱动消息)
# 注意：JWT 签名使用 JWKS (RS256) 非对称密钥，密钥在运行时自动生成并持久化到 /app/data/keys

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GO_VERSION: '1.24'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: fangcunmount/iam-contracts  # 必须小写，Docker 不支持大写字母

jobs:
  validate-secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check Required Secrets
        env:
          SVRA_HOST: ${{ secrets.SVRA_HOST }}
          SVRA_USERNAME: ${{ secrets.SVRA_USERNAME }}
          SVRA_SSH_KEY: ${{ secrets.SVRA_SSH_KEY }}
          SVRA_SSH_PORT: ${{ secrets.SVRA_SSH_PORT }}
          SVRA_SUDO_PASSWORD: ${{ secrets.SVRA_SUDO_PASSWORD }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DBNAME: ${{ secrets.MYSQL_DBNAME }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_DB: ${{ secrets.REDIS_DB }}
          REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          IPD_ENCRYPTION_KEY: ${{ secrets.IPD_ENCRYPTION_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          WWW_UID: ${{ secrets.WWW_UID }}
          WWW_GID: ${{ secrets.WWW_GID }}
          NSQ_LOOKUPD_HOST: ${{ secrets.NSQ_LOOKUPD_HOST }}
          NSQ_LOOKUPD_PORT: ${{ secrets.NSQ_LOOKUPD_PORT }}
          NSQ_NSQD_HOST: ${{ secrets.NSQ_NSQD_HOST }}
          NSQ_NSQD_PORT: ${{ secrets.NSQ_NSQD_PORT }}
        run: |
          echo "🔍 Validating GitHub Action secrets..."
          VALIDATION_FAILED=0
          ENFORCE_REQUIRED=0
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENFORCE_REQUIRED=1
            echo "📋 Checking required secrets for main branch deployment..."
          else
            echo "ℹ️ Not on main branch – required secrets reported for awareness only."
          fi

          REQUIRED_SECRETS=(SVRA_HOST SVRA_USERNAME SVRA_SSH_KEY MYSQL_HOST MYSQL_USERNAME MYSQL_PASSWORD MYSQL_DBNAME REDIS_HOST DOCKERHUB_USERNAME DOCKERHUB_TOKEN)
          OPTIONAL_SECRETS=(SVRA_SSH_PORT SVRA_SUDO_PASSWORD MYSQL_PORT REDIS_PORT REDIS_DB REDIS_USERNAME REDIS_PASSWORD WWW_UID WWW_GID NSQ_LOOKUPD_HOST NSQ_LOOKUPD_PORT NSQ_NSQD_HOST NSQ_NSQD_PORT)

          REQUIRED_SECRETS+=(IPD_ENCRYPTION_KEY)

          for SECRET_NAME in "${REQUIRED_SECRETS[@]}"; do
            VALUE=${!SECRET_NAME}
            if [ -n "$VALUE" ]; then
              echo "✅ $SECRET_NAME is set"
            else
              if [ $ENFORCE_REQUIRED -eq 1 ]; then
                echo "❌ $SECRET_NAME is not set"
                VALIDATION_FAILED=1
              else
                echo "⚠️ $SECRET_NAME is not set (required when deploying main)"
              fi
            fi
          done

          echo ""
          echo "📎 Checking optional secrets (warnings only)..."
          for SECRET_NAME in "${OPTIONAL_SECRETS[@]}"; do
            VALUE=${!SECRET_NAME}
            if [ -n "$VALUE" ]; then
              echo "✅ $SECRET_NAME is set"
            else
              case "$SECRET_NAME" in
                SVRA_SUDO_PASSWORD)
                  echo "⚠️ $SECRET_NAME is not set (needed only if sudo prompts for a password)"
                  ;;
                WWW_UID|WWW_GID)
                  echo "⚠️ $SECRET_NAME is not set (deploy job 默认 999/988)"
                  ;;
                MYSQL_PORT)
                  echo "⚠️ $SECRET_NAME is not set (defaults to 3306)"
                  ;;
                REDIS_PORT)
                  echo "⚠️ $SECRET_NAME is not set (defaults to 6379)"
                  ;;
                REDIS_DB)
                  echo "⚠️ $SECRET_NAME is not set (defaults to DB 0)"
                  ;;
                REDIS_USERNAME)
                  echo "⚠️ $SECRET_NAME is not set (uses default Redis user)"
                  ;;
                REDIS_PASSWORD)
                  echo "⚠️ $SECRET_NAME is not set (Redis auth disabled)"
                  ;;
                SVRA_SSH_PORT)
                  echo "⚠️ $SECRET_NAME is not set (defaults to 22)"
                  ;;
                *)
                  echo "⚠️ $SECRET_NAME is not set (optional)"
                  ;;
              esac
            fi
          done

          echo ""
          if [ $ENFORCE_REQUIRED -eq 1 ] && [ $VALIDATION_FAILED -eq 1 ]; then
            echo "⚠️ Secrets validation failed! Please configure the missing required secrets before pushing to main."
            echo "ℹ️ Continuing anyway for non-deployment jobs..."
          elif [ $ENFORCE_REQUIRED -eq 0 ] && [ $VALIDATION_FAILED -eq 1 ]; then
            echo "⚠️ Some required secrets are missing – deployment on main will fail until they are set."
          else
            echo "✅ Required secrets look good!"
          fi

  test:
    name: Run Tests
    needs: [validate-secrets, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Get dependencies
        run: |
          go mod download
          go mod verify
      - name: Run tests
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Generate coverage report
        run: |
          go tool cover -func=coverage.out
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install dependencies
        run: |
          go mod download
      - name: Run make lint
        run: |
          make lint

  build:
    name: Build Application
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: |
          make build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iam-apiserver
          path: bin/apiserver
          retention-days: 7

  docker:
    name: Build Docker Image
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Docker image
        run: |
          make docker-build
        env:
          DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
          DOCKER_REPOSITORY: fangcunmount
          VERSION: ${{ github.sha }}
          DOCKER_TAG: ${{ github.sha }}
      - name: Push to GitHub Container Registry
        run: |
          make docker-push
        env:
          DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
          DOCKER_REPOSITORY: fangcunmount
          VERSION: ${{ github.sha }}
      - name: Tag and Push to Docker Hub
        run: |
          docker tag ghcr.io/fangcunmount/iam-contracts:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/iam-contracts:latest
          docker tag ghcr.io/fangcunmount/iam-contracts:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/iam-contracts:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/iam-contracts:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/iam-contracts:${{ github.sha }}
          echo "✅ 镜像已推送到 Docker Hub:"
          echo "   - ${{ secrets.DOCKERHUB_USERNAME }}/iam-contracts:latest"
          echo "   - ${{ secrets.DOCKERHUB_USERNAME }}/iam-contracts:${{ github.sha }}"

  deploy:
    name: Deploy to Production
    needs: [build, docker]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    environment:
      name: production
      url: https://iam.fangcunmount.cn
    env:
      WWW_UID: ${{ secrets.WWW_UID || '999' }}
      WWW_GID: ${{ secrets.WWW_GID || '988' }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify GHCR auth on runner
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "🔐 Verifying GHCR access on runner..."
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin >/dev/null
          echo "✅ GHCR login succeeded on runner"

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: iam-apiserver
          path: ./artifacts

      # === 在 Runner 侧生成 .env，避免远端 heredoc + sudo ===
      - name: Prepare deployment files
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT || 3306 }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DBNAME: ${{ secrets.MYSQL_DBNAME }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT || 6379 }}
          REDIS_DB: ${{ secrets.REDIS_DB || 0 }}
          REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          IPD_ENCRYPTION_KEY: ${{ secrets.IPD_ENCRYPTION_KEY }}
          NSQ_LOOKUPD_HOST: ${{ secrets.NSQ_LOOKUPD_HOST }}
          NSQ_LOOKUPD_PORT: ${{ secrets.NSQ_LOOKUPD_PORT || 4161 }}
          NSQ_NSQD_HOST: ${{ secrets.NSQ_NSQD_HOST }}
          NSQ_NSQD_PORT: ${{ secrets.NSQ_NSQD_PORT || 4150 }}
        run: |
          # artifact 文件名是 apiserver，需要重命名为 iam-apiserver
          mv ./artifacts/apiserver ./artifacts/iam-apiserver
          chmod +x ./artifacts/iam-apiserver

          mkdir -p deploy-package/configs/env
          mkdir -p deploy-package/build/docker
          cp ./artifacts/iam-apiserver deploy-package/

          # 拷贝仓库配置和编排文件
          cp -r configs deploy-package/
          cp build/docker/docker-compose.prod.yml deploy-package/build/docker/docker-compose.prod.yml

          # 生成生产环境 env(本地生成,随包上传)
          cat > deploy-package/configs/env/config.prod.env <<EOF
          # Auto-generated production environment configuration
          IAM_APISERVER_MYSQL_HOST=${MYSQL_HOST}:${MYSQL_PORT}
          IAM_APISERVER_MYSQL_USERNAME=${MYSQL_USERNAME}
          IAM_APISERVER_MYSQL_PASSWORD=${MYSQL_PASSWORD}
          IAM_APISERVER_MYSQL_DATABASE=${MYSQL_DBNAME}
          
          # Redis (缓存/令牌)
          IAM_APISERVER_REDIS_CACHE_HOST=${REDIS_HOST}
          IAM_APISERVER_REDIS_CACHE_PORT=${REDIS_PORT}
          IAM_APISERVER_REDIS_CACHE_USERNAME=${REDIS_USERNAME}
          IAM_APISERVER_REDIS_CACHE_PASSWORD=${REDIS_PASSWORD}
          IAM_APISERVER_REDIS_CACHE_DATABASE=${REDIS_DB}
          
          IAM_APISERVER_IDP_ENCRYPTION_KEY=${IPD_ENCRYPTION_KEY}
          
          # NSQ Configuration (Event-driven messaging)
          IAM_APISERVER_NSQ_ENABLED=${NSQ_LOOKUPD_HOST:+true}
          IAM_APISERVER_NSQ_LOOKUPD_ADDRS=${NSQ_LOOKUPD_HOST}:${NSQ_LOOKUPD_PORT}
          IAM_APISERVER_NSQ_NSQD_ADDR=${NSQ_NSQD_HOST}:${NSQ_NSQD_PORT}
          EOF

          echo "=========================================="
          echo "📋 Generated config.prod.env content:"
          echo "=========================================="
          cat deploy-package/configs/env/config.prod.env | sed 's/PASSWORD=.*/PASSWORD=***REDACTED***/g' | sed 's/ENCRYPTION_KEY=.*/ENCRYPTION_KEY=***REDACTED***/g'
          echo "=========================================="

          tar -czf deploy-package.tar.gz -C deploy-package .

      - name: Upload deployment package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SVRA_HOST }}
          username: ${{ secrets.SVRA_USERNAME }}
          key: ${{ secrets.SVRA_SSH_KEY }}
          port: ${{ secrets.SVRA_SSH_PORT || 22 }}
          source: "deploy-package.tar.gz"
          target: "/tmp"

      # === 远端只用白名单命令；TLS 固定挂载到 /etc/iam-contracts/ssl（与 apiserver.yaml 保持一致）
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.0
        env:
          DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          GHCR_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SUDO_PASSWORD: ${{ secrets.SVRA_SUDO_PASSWORD }}
          WWW_UID: ${{ env.WWW_UID }}
          WWW_GID: ${{ env.WWW_GID }}
        with:
          host: ${{ secrets.SVRA_HOST }}
          username: ${{ secrets.SVRA_USERNAME }}
          key: ${{ secrets.SVRA_SSH_KEY }}
          port: ${{ secrets.SVRA_SSH_PORT || 22 }}
          envs: DOCKER_REGISTRY,IMAGE_NAME,IMAGE_TAG,GHCR_USERNAME,GITHUB_TOKEN,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,SUDO_PASSWORD,WWW_UID,WWW_GID
          script: |
            set -Eeuo pipefail

            APP_UID="${WWW_UID:-1000}"
            APP_GID="${WWW_GID:-1000}"

            # ----- SUDO 助手：免密优先；若需密码则每次 sudo 都喂密码 -----
            if sudo -n true 2>/dev/null; then
              SUDO="sudo"
              echo "ℹ️ Using passwordless sudo (NOPASSWD)."
            else
              if [ -z "${SUDO_PASSWORD:-}" ]; then
                echo "❌ sudo needs password. Provide SVRA_SUDO_PASSWORD or configure NOPASSWD." >&2
                exit 1
              fi
              sudo_pw() { sudo -S "$@" <<<"$SUDO_PASSWORD"; }
              export -f sudo_pw
              SUDO="sudo_pw"
              $SUDO -v || true
              echo "ℹ️ Using sudo with password via STDIN for every command."
            fi

            if [ "$SUDO" = "sudo_pw" ]; then
              SUDO_ASKPASS_SCRIPT="$(mktemp)"
              printf '%s\n' '#!/bin/sh' 'printf '\''%s\n'\'' "$SUDO_PASSWORD"' >"$SUDO_ASKPASS_SCRIPT"
              chmod 700 "$SUDO_ASKPASS_SCRIPT"
            fi

            cleanup_auth_helpers() {
              if [ -n "${SUDO_ASKPASS_SCRIPT:-}" ]; then
                rm -f "$SUDO_ASKPASS_SCRIPT"
              fi
            }
            trap cleanup_auth_helpers EXIT

            docker_login_with_token() {
              local username="$1"
              local token="$2"
              local registry="${3:-}"
              local token_file rc

              token_file="$(mktemp)"
              chmod 600 "$token_file"
              printf '%s' "$token" >"$token_file"
              rc=1

              if [ "$SUDO" = "sudo_pw" ]; then
                if [ -n "$registry" ]; then
                  if SUDO_ASKPASS="$SUDO_ASKPASS_SCRIPT" sudo -A docker login "$registry" -u "$username" --password-stdin <"$token_file" >/dev/null; then
                    rc=0
                  else
                    rc=$?
                  fi
                else
                  if SUDO_ASKPASS="$SUDO_ASKPASS_SCRIPT" sudo -A docker login -u "$username" --password-stdin <"$token_file" >/dev/null; then
                    rc=0
                  else
                    rc=$?
                  fi
                fi
              else
                if [ -n "$registry" ]; then
                  if $SUDO docker login "$registry" -u "$username" --password-stdin <"$token_file" >/dev/null; then
                    rc=0
                  else
                    rc=$?
                  fi
                else
                  if $SUDO docker login -u "$username" --password-stdin <"$token_file" >/dev/null; then
                    rc=0
                  else
                    rc=$?
                  fi
                fi
              fi

              rm -f "$token_file"
              return "$rc"
            }

            echo "=========================================="
            echo "Starting deployment to Production Server (SVRA)"
            echo "=========================================="

            # 目录准备
            $SUDO mkdir -p /opt/iam/configs/env /opt/iam/configs/ssl /var/log/iam-contracts /opt/iam/bin

            # 备份
            BACKUP_DIR="/opt/backups/iam/deployments"
            $SUDO mkdir -p "$BACKUP_DIR"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            if [ -d "/opt/iam/configs" ] && [ "$(ls -A /opt/iam/configs 2>/dev/null)" != "" ]; then
              $SUDO tar -czf "$BACKUP_DIR/backup_${TIMESTAMP}.tar.gz" \
                /opt/iam/configs /var/log/iam-contracts \
                2>/dev/null || echo "No previous version to backup"
            else
              echo "No previous version to backup"
            fi

            # 解包并用 rsync 同步（替代 cp -r）
            echo "Extracting new deployment package..."
            DEPLOY_TMP="/tmp/iam-deploy-$$"
            mkdir -p "$DEPLOY_TMP"
            tar -xzf /tmp/deploy-package.tar.gz -C "$DEPLOY_TMP"

            # 网络
            if ! $SUDO docker network ls --format '{{.Name}}' | grep -w infra-network > /dev/null 2>&1; then
              echo "Creating Docker network infra-network (overlay attachable)..."
              $SUDO docker network create --driver overlay --attachable infra-network || {
                echo "❌ Failed to create overlay network. Ensure Docker Swarm is initialized."; exit 1; }
            fi

            # ======== 固定使用 /etc/iam-contracts/ssl 作为容器内证书目录 ========
            CERT_HOST_PATH="/data/ssl/certs/fangcunmount.cn.crt"
            KEY_HOST_PATH="/data/ssl/private/fangcunmount.cn.key"

            # 用 root 身份检查，避免 deploy 身份被权限挡住
            if ! $SUDO test -r "$CERT_HOST_PATH"; then
              echo "❌ CERT not readable by root: $CERT_HOST_PATH"
              $SUDO ls -l "$CERT_HOST_PATH" || true
              exit 1
            fi

            if ! $SUDO test -r "$KEY_HOST_PATH"; then
              echo "❌ KEY not readable by root: $KEY_HOST_PATH"
              # 把每级目录权限也打印出来便于诊断
              $SUDO namei -l "$KEY_HOST_PATH" || true
              exit 1
            fi

            # compose 中 iam-apiserver 以 user: WWW_UID:WWW_GID 运行；bind 挂载保留宿主机权限，
            # 若私钥仅为 root 可读则容器内会 permission denied，需与运行 UID 对齐。
            $SUDO chown "$APP_UID:$APP_GID" "$CERT_HOST_PATH" "$KEY_HOST_PATH"
            $SUDO chmod 0644 "$CERT_HOST_PATH"
            $SUDO chmod 0640 "$KEY_HOST_PATH"

            TLS_MOUNTS="-v $CERT_HOST_PATH:/etc/iam-contracts/ssl/fangcunmount.cn.crt:ro \
                        -v $KEY_HOST_PATH:/etc/iam-contracts/ssl/fangcunmount.cn.key:ro"
            # ===========================================================

            # GHCR 登录（使用 GitHub Actions 自带的 GITHUB_TOKEN）
            echo "------------------------------------------"
            echo "🔎 GHCR access checklist (if login fails):"
            echo "1) Package settings -> Repository access: add repo 'fangcun-mount/iam-contracts'"
            echo "2) Ensure repo has Read access to the package"
            echo "3) Org settings -> Packages: allow repository access if required"
            echo "------------------------------------------"
            GHCR_LOGIN_OK=0
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              echo "Logging into GitHub Container Registry..."
              docker_login_with_token "$GHCR_USERNAME" "$GITHUB_TOKEN" "$DOCKER_REGISTRY" && GHCR_LOGIN_OK=1 || GHCR_LOGIN_OK=0
            fi

            # GHCR 登录失败时回退到 Docker Hub（qs-server 风格）
            if [ "${GHCR_LOGIN_OK:-0}" -ne 1 ]; then
              if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
                echo "⚠️ GHCR login failed; falling back to Docker Hub..."
                DOCKERHUB_LOGIN_OK=0
                docker_login_with_token "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" && DOCKERHUB_LOGIN_OK=1 || DOCKERHUB_LOGIN_OK=0
                if [ "$DOCKERHUB_LOGIN_OK" -ne 1 ]; then
                  echo "❌ Docker Hub login failed; verify DOCKERHUB_USERNAME/DOCKERHUB_TOKEN." >&2
                  exit 1
                fi
                DOCKER_REGISTRY="docker.io"
                IMAGE_NAME="${DOCKERHUB_USERNAME}/iam-contracts"
              else
                echo "⚠️ GHCR login failed and Docker Hub credentials are missing."
              fi
            fi

            # 确保 docker compose 可用
            if ! $SUDO docker compose version >/dev/null 2>&1; then
              echo "❌ docker compose is not available on target host."; exit 1;
            fi

            # 确保基础设施网络存在（已由运维预置，但仍校验）
            if ! $SUDO docker network ls --format '{{.Name}}' | grep -w infra-network >/dev/null 2>&1; then
              echo "❌ Required network infra-network not found. Please create it first."; exit 1;
            fi

            # 将部署包放置到 /opt/iam
            $SUDO mkdir -p /opt/iam/build/docker
            $SUDO rsync -a "$DEPLOY_TMP/build/docker/docker-compose.prod.yml" /opt/iam/build/docker/docker-compose.prod.yml

            # 覆盖配置与二进制
            $SUDO rsync -a "$DEPLOY_TMP/configs/" /opt/iam/configs/
            $SUDO rsync -a "$DEPLOY_TMP/iam-apiserver" /opt/iam/bin/iam-apiserver
            $SUDO chmod 0755 /opt/iam/bin/iam-apiserver
            $SUDO chown -R "$APP_UID:$APP_GID" /opt/iam/configs

            # 准备日志/密钥目录
            LOG_DIR_HOST="/data/logs/iam"
            $SUDO mkdir -p "$LOG_DIR_HOST"
            $SUDO chown -R "$APP_UID:$APP_GID" "$LOG_DIR_HOST"

            KEY_DIR_HOST="/data/ops/iam-keys"
            $SUDO mkdir -p "$KEY_DIR_HOST"
            $SUDO chown -R "$APP_UID:$APP_GID" "$KEY_DIR_HOST"
            $SUDO chmod 0750 "$KEY_DIR_HOST"

            # 检查 gRPC mTLS 证书是否存在（由 infra 项目统一管理）
            GRPC_DIR_HOST="/data/infra/ssl/grpc"
            GRPC_CA="$GRPC_DIR_HOST/ca/ca-chain.crt"
            GRPC_CRT="$GRPC_DIR_HOST/server/iam-apiserver.crt"
            GRPC_KEY="$GRPC_DIR_HOST/server/iam-apiserver.key"
            for f in "$GRPC_CA" "$GRPC_CRT" "$GRPC_KEY"; do
              if ! $SUDO test -r "$f"; then
                echo "❌ Missing or unreadable gRPC mTLS file: $f"
                exit 1
              fi
            done
            $SUDO chown "$APP_UID:$APP_GID" "$GRPC_CA" "$GRPC_CRT" "$GRPC_KEY"
            $SUDO chmod 0644 "$GRPC_CA" "$GRPC_CRT"
            $SUDO chmod 0640 "$GRPC_KEY"
            echo "✅ gRPC certs found under $GRPC_DIR_HOST (ownership aligned to container user)"

            # 导出运行所需环境变量（供 compose 内插值）
            export DOCKER_REGISTRY IMAGE_NAME IMAGE_TAG
            export WWW_UID="$APP_UID" WWW_GID="$APP_GID"

            # 使用 docker compose 部署（仅 iam-apiserver 服务，强制重建并拉取最新镜像）
            COMPOSE_FILE="/opt/iam/build/docker/docker-compose.prod.yml"
            (cd /opt/iam && $SUDO docker compose -f "$COMPOSE_FILE" pull iam-apiserver)
            (cd /opt/iam && $SUDO docker compose -f "$COMPOSE_FILE" up -d --force-recreate --remove-orphans iam-apiserver)

            # 清理临时目录与上传包
            rm -rf "$DEPLOY_TMP"
            rm -f /tmp/deploy-package.tar.gz

            # 健康检查
            echo "Waiting for service to be ready..."
            ATTEMPTS=0
            MAX_ATTEMPTS=30
            while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
              if $SUDO docker exec iam-apiserver curl -sf http://127.0.0.1:9080/healthz > /dev/null 2>&1; then
                echo "✅ API health check passed (attempt $ATTEMPTS)"
                $SUDO docker ps --filter "name=iam-apiserver" --format "table {{.Names}}\t{{.Status}}"
                break
              fi
              ATTEMPTS=$((ATTEMPTS + 1))
              if [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; then
                echo "⏳ Health check attempt $ATTEMPTS/$MAX_ATTEMPTS failed, retrying in 5 seconds..."
                sleep 5
              fi
            done

            if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
              echo "❌ Service failed to start after $MAX_ATTEMPTS attempts"
              echo "Checking container status..."
              $SUDO docker ps -a --filter "name=iam-apiserver" || true
              echo "Checking container logs..."
              $SUDO docker logs --tail 2000 iam-apiserver || true
              exit 1
            fi

            # 清理旧备份（保留 10 个）
            echo "Cleaning up old backups..."
            $SUDO bash -c 'ls -t '"$BACKUP_DIR"'/backup_*.tar.gz 2>/dev/null | tail -n +11 | xargs -r rm -f 2>/dev/null || true'

            echo "=========================================="
            echo "✅ Deployment completed successfully"
            echo "=========================================="

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.0
        env:
          SUDO_PASSWORD: ${{ secrets.SVRA_SUDO_PASSWORD }}
        with:
          host: ${{ secrets.SVRA_HOST }}
          username: ${{ secrets.SVRA_USERNAME }}
          key: ${{ secrets.SVRA_SSH_KEY }}
          port: ${{ secrets.SVRA_SSH_PORT || 22 }}
          envs: SUDO_PASSWORD
          script: |
            set -Eeuo pipefail

            if sudo -n true 2>/dev/null; then
              SUDO="sudo"
            else
              if [ -z "${SUDO_PASSWORD:-}" ]; then
                echo "❌ sudo needs password. Provide SVRA_SUDO_PASSWORD or configure NOPASSWD." >&2
                exit 1
              fi
              sudo_pw() { sudo -S "$@" <<<"$SUDO_PASSWORD"; }
              export -f sudo_pw
              SUDO="sudo_pw"
              $SUDO -v || true
            fi

            echo "Verifying deployment..."

            if $SUDO docker ps --filter "name=iam-apiserver" --format '{{.Names}}' | grep -w iam-apiserver > /dev/null 2>&1; then
              echo "✅ Docker container is running"
            else
              echo "❌ Docker container is not running"
              $SUDO docker ps -a --filter "name=iam-apiserver" || true
              exit 1
            fi

            RESPONSE=$($SUDO docker exec iam-apiserver curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:9080/healthz || echo "000")
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ API is responding correctly"
            else
              echo "❌ API returned status: $RESPONSE"
              exit 1
            fi

            echo "Deployed version:"
            $SUDO docker exec iam-apiserver /app/apiserver version || echo "Version check skipped"

            echo "✅ Deployment verification passed"

  notify:
    name: Send Notification
    needs: [deploy]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Log deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment to production succeeded"
          else
            echo "❌ Deployment to production failed"
            exit 1
          fi
